<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Dashboard</title>

    <link rel="stylesheet" href="student.css">

</head>

<body>

    <!-- Navigation Bar -->

    <header>

        <div class="logo">
            StudyTracker
        </div>

        <nav>

            <a href="#">Home</a>

            <a href="#">Assignments</a>

            <a href="#">Dashboard</a>

            <a href="#">Logout</a>

        </nav>

    </header>



    <!-- Dashboard -->

    <section class="dashboard">

        <h1>Welcome, Sai 👋</h1>

        <p>Manage your assignments efficiently.</p>

    </section>



    <!-- Statistics -->

    <section class="stats">

        <div class="card">

            <h2>12</h2>

            <p>Total Assignments</p>

        </div>

        <div class="card">

            <h2>8</h2>

            <p>Completed</p>

        </div>

        <div class="card">

            <h2>4</h2>

            <p>Pending</p>

        </div>

    </section>



    <!-- Upcoming Deadline -->

    <section class="deadline">

        <h2>Upcoming Deadline</h2>

        <p><strong>Physics Homework</strong></p>

        <p>Due : 10 July 2026</p>

        <button>View Assignment</button>

    </section>



</body>

</html>
