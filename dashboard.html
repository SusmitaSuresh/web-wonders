<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTask Dashboard</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<!-- ================= HEADER ================= -->

<header>

    <div class="logo-section">

        <img src="websiteLogo.jpeg" class="logo">

        <h2>EduTask</h2>

    </div>

    <button class="profile-btn"></button>

</header>

<!-- ================= MAIN ================= -->

<div class="dashboard">

    <!-- =========== SIDEBAR =========== -->

    <aside class="sidebar">

        <a href="#">
            <i class="fa-solid fa-house"></i>
            Home
        </a>

        <a href="#">
            <i class="fa-solid fa-trophy"></i>
            Leaderboard
        </a>

        <a href="#">
            <i class="fa-solid fa-bell"></i>
            Notifications
        </a>

        <a href="#">
            <i class="fa-solid fa-list-check"></i>
            Tasks
        </a>

        <a href="#">
            <i class="fa-solid fa-square-poll-vertical"></i>
            Test Results
        </a>

        <!-- SUBJECTS -->

        <button class="dropdown-btn">

            Subjects

            <i class="fa-solid fa-chevron-down"></i>

        </button>

        <div class="dropdown-content">

            <a href="#">Sub 1</a>

            <a href="#">Sub 2</a>

            <a href="#">Sub 3</a>

            <a href="#">Sub 4</a>

        </div>

    </aside>

    <!-- =========== CONTENT =========== -->

    <main class="content">

        <div class="card">

            <div class="card-header">
                Sub 1
            </div>

            <div class="card-body">

                <span>10 Tasks Remaining</span>

                <button>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>

            </div>

        </div>


        <div class="card">

            <div class="card-header">
                Sub 2
            </div>

            <div class="card-body">

                <span>0 Tasks Remaining</span>

                <button>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>

            </div>

        </div>


        <div class="card">

            <div class="card-header">
                Sub 3
            </div>

            <div class="card-body">

                <span>5 Tasks Remaining</span>

                <button>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>

            </div>

        </div>


        <div class="card">

            <div class="card-header">
                Sub 4
            </div>

            <div class="card-body">

                <span>2 Tasks Remaining</span>

                <button>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>

            </div>

        </div>

    </main>

</div>

<script src="dashboard.js"></script>

</body>
</html>
